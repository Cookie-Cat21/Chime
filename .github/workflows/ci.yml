name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: lint-typecheck-unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      # Factory loop status (E2-O03) — must exit 0; board/scoreboard smoke.
      # Keep ruff/mypy/pytest below; scripts/factory/verify.sh is the local
      # canonical verify (same tools) when citing pass reports.
      - name: Factory status
        run: python scripts/factory/loop_status.py

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy chime

      - name: Pytest (unit; no DATABASE_URL required)
        run: pytest
        env:
          # Ensure DB-backed tests skip in the unit job
          DATABASE_URL: ""

  integration:
    name: migrate-and-db-tests
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: .
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chime
          POSTGRES_PASSWORD: chime
          POSTGRES_DB: chime
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chime -d chime"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://chime:chime@localhost:5432/chime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Apply migrations
        run: python -m chime.migrate

      - name: Pytest (including DB tests)
        run: |
          set -euo pipefail
          pytest --tb=line | tee /tmp/chime-db-pytest.txt

      - name: Require DB integration tests ran (not skipped)
        run: |
          set -euo pipefail
          # Do not re-run against a warm DB — check the primary suite output instead.
          if ! grep -Eiq 'test_poller_integration\.py|test_advisory_lock\.py' /tmp/chime-db-pytest.txt; then
            echo "::error::Expected DB integration modules missing from pytest output"
            exit 1
          fi
          if grep -Eiq 'SKIPPED \[.*\] test_crossing_fires_telegram_once|SKIPPED \[.*\] test_kill_restart' /tmp/chime-db-pytest.txt; then
            echo "::error::DB integration tests skipped; DATABASE_URL required"
            exit 1
          fi
          if ! grep -Eq '[0-9]+ passed' /tmp/chime-db-pytest.txt; then
            echo "::error::No passed count in pytest output"
            exit 1
          fi
          echo "DB integration gate ok"

  web:
    name: web-lint-typecheck-smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Next build
        run: npm run build
        env:
          # Build-time: session secret optional; smoke sets runtime env.
          DASH_SESSION_SECRET: ci-smoke-secret-not-for-prod
          DASH_DEMO_AUTH: "0"

      - name: Dash smoke (next start + curl)
        working-directory: .
        run: bash scripts/factory/dash_smoke.sh
        env:
          DASH_DEMO_AUTH: "0"
          DASH_SESSION_SECRET: ci-smoke-secret-not-for-prod

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Chime CSE brand board Ticker Strike">
  <title>Chime CSE brand board</title>
  <rect width="1200" height="400" fill="#EDE6D9"/>

  <g fill="none" stroke="#0B6E4F" stroke-width="3.5" stroke-linecap="square" transform="translate(48 36) scale(2.3)">
    <path d="M3.5 14 H20.5"/>
    <path d="M12 4.5 V19.5"/>
  </g>
  <text x="120" y="90"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-1.4" fill="#12110F">Chime</text>
  <text x="310" y="90"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-1.4" fill="#0B6E4F">CSE</text>

  <text x="48" y="140"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" fill="#5C574E">TICKER STRIKE  |  CSE moves. You hear it.</text>

  <g transform="translate(48 180)">
    <rect width="88" height="88" fill="#EDE6D9" stroke="#C8C0B4"/>
    <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">paper</text>
    <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#EDE6D9</text>

    <g transform="translate(108 0)">
      <rect width="88" height="88" fill="#12110F"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">ink</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#12110F</text>
    </g>
    <g transform="translate(216 0)">
      <rect width="88" height="88" fill="#0B6E4F"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">signal</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#0B6E4F</text>
    </g>
    <g transform="translate(324 0)">
      <rect width="88" height="88" fill="#0F6B3C"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">up</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#0F6B3C</text>
    </g>
    <g transform="translate(432 0)">
      <rect width="88" height="88" fill="#B91C1C"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">down</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#B91C1C</text>
    </g>
    <g transform="translate(540 0)">
      <rect width="88" height="88" fill="#D97706"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">fired only</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#D97706</text>
    </g>
    <g transform="translate(648 0)">
      <rect width="88" height="88" fill="#5C574E"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">mute</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#5C574E</text>
    </g>
    <g transform="translate(756 0)">
      <rect width="88" height="88" fill="#C8C0B4"/>
      <text x="0" y="108" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">line</text>
      <text x="0" y="124" font-family="Menlo, Consolas, monospace" font-size="11" fill="#12110F">#C8C0B4</text>
    </g>
  </g>

  <text x="900" y="72" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5C574E">Mark = threshold cross</text>
  <text x="900" y="94" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5C574E">Not a bell. Not mist.</text>
  <text x="900" y="116" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5C574E">Product UI: IBM Plex Sans / Mono</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-label="Chime CSE landing first viewport">
  <title>Chime CSE landing first viewport</title>
  <rect width="1440" height="900" fill="#EDE6D9"/>
  <line x1="0" y1="72" x2="1440" y2="72" stroke="#C8C0B4" stroke-width="1"/>
  <line x1="0" y1="828" x2="1440" y2="828" stroke="#C8C0B4" stroke-width="1"/>

  <text x="72" y="48"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600" fill="#5C574E">CHIME CSE  |  COLOMBO STOCK EXCHANGE ALERTS</text>

  <g fill="none" stroke="#0B6E4F" stroke-width="5" stroke-linecap="square" transform="translate(72 150) scale(2.8)">
    <path d="M3.5 14 H20.5"/>
    <path d="M12 4.5 V19.5"/>
  </g>

  <text x="170" y="230"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-2.5" fill="#12110F">Chime</text>
  <text x="520" y="230"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="-2.5" fill="#0B6E4F">CSE</text>

  <text x="72" y="340"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="36" font-weight="600" fill="#12110F">CSE moves. You hear it.</text>
  <text x="72" y="384"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="18" fill="#5C574E">Set a price, move, disclosure, or filing rule.</text>
  <text x="72" y="412"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="18" fill="#5C574E">Chime pings Telegram the moment it fires. No tab left open.</text>

  <rect x="72" y="460" width="240" height="52" rx="2" fill="#0B6E4F"/>
  <text x="192" y="492" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="600" fill="#EDE6D9">Open Telegram bot</text>

  <rect x="332" y="460" width="220" height="52" rx="2" fill="none" stroke="#0B6E4F" stroke-width="2"/>
  <text x="442" y="492" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="600" fill="#0B6E4F">Manage in browser</text>

  <g transform="translate(820 300)">
    <rect width="520" height="220" rx="2" fill="#F7F3EC" stroke="#C8C0B4"/>
    <rect x="0" y="0" width="6" height="220" fill="#D97706"/>
    <text x="24" y="36" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#5C574E">Telegram  |  Chime CSE</text>
    <text x="24" y="84" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#12110F">JKH.N0000 crossed above</text>
    <text x="24" y="120" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="500" fill="#12110F">22.50</text>
    <text x="24" y="164" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#12110F">Last 22.75  |  rule #184</text>
    <text x="24" y="196" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5C574E">Not financial advice. Informational only.</text>
  </g>

  <text x="72" y="870"
        font-family="Helvetica, Arial, sans-serif"
        font-size="12" fill="#5C574E">Not financial advice. Public CSE data. Push lives on Telegram.</text>
